# Dataset registry for CommandDepartureBenchmark.
# Required fields consumed by pipeline scripts:
# - tier
# - raw_subdir
# - version
#
# Additional fields are used for curation, compliance, and reproducibility.
datasets:
  # Tier 0 (spine)
  ninapro_db10_meganepro:
    display_name: "NinaPro DB10 (MeganePro)"
    tier: 0
    modalities: ["emg", "imu", "gaze", "egovideo", "head_imu", "behavioral", "clinical"]
    access: "manual_download_registration"
    license: "Research use with dataset registration/terms acceptance"
    home: "https://ninapro.hevs.ch/instructions/DB10.html"
    download_url: "https://ninapro.hevs.ch/instructions/DB10.html"
    citation: "Masson et al., Scientific Data 2020 (NinaPro DB10 with MeganePro)"
    raw_subdir: "raw/ninapro_db10_meganepro"
    version: "2020"
    citation_key: "NinaProDB10SciData2020"
    adapter_status: "planned_pr_a6"
    arbitration_role: "full"
    dataverse_pids:
      - "doi:10.7910/DVN/1Z3IOM"
      - "doi:10.7910/DVN/78QFZH"
      - "doi:10.7910/DVN/F9R33N"
      - "doi:10.7910/DVN/EJJ91H"
    expected_raw_layout:
      - "raw/ninapro_db10_meganepro/<subject_id>/"
      - "raw/ninapro_db10_meganepro/<subject_id>/meganepro/"
      - "raw/ninapro_db10_meganepro/<subject_id>/emg_imu/"
    verification_hash_steps:
      - "Store upstream archive checksums when downloading."
      - "Run scripts/utils/write_manifest.py with raw path as --input."
      - "Record tree_sha256 in results/<exp>/manifest.json."

  harmonic:
    display_name: "HARMONIC"
    tier: 0
    modalities: ["eye_video", "egovideo", "joystick", "emg", "robot_state", "stereo_video"]
    access: "manual_or_script"
    license: "Dataset terms and access policy; verify per release"
    home: "https://harplab.github.io/harmonic/"
    download_url: "https://huggingface.co/datasets/harmonicdataset/HARMONIC/tree/main/data"
    citation: "Narang et al., HARMONIC dataset and benchmark"
    raw_subdir: "raw/harmonic"
    version: "1.0.0"
    citation_key: "HARMONIC"
    adapter_status: "planned_pr_a5"
    arbitration_role: "p_a_only"
    expected_raw_layout:
      - "raw/harmonic/<session_id>/"
      - "raw/harmonic/<session_id>/recording.*"
      - "raw/harmonic/<session_id>/calibration.*"
    verification_hash_steps:
      - "Keep vendor-provided checksums for downloaded archives."
      - "Hash extracted tree with scripts/utils/write_manifest.py."
      - "Check manifests before preprocessing."
    hash_scope:
      # HARMONIC tarballs are large; hash only extracted variant payload.
      include_globs:
        - "extracted/*/text/**"
        - "extracted/*/minimal/**"
      exclude_globs:
        - "extracted/**/README*"
        - "extracted/**/*.md"
        - "extracted/**/*.pdf"
      large_file_count_threshold: 50000
      large_bytes_threshold: 5368709120

  # Tier 1 (EMG robustness)
  physionet_grabmyo:
    display_name: "GRABMyo (PhysioNet)"
    tier: 1
    modalities: ["emg"]
    access: "script_or_manual_physionet"
    license: "Open Data Commons Attribution License v1.0"
    home: "https://physionet.org/content/grabmyo/"
    download_url: "https://physionet.org/content/grabmyo/1.0.2/"
    citation: "Sburlea et al., Scientific Data 2021; PhysioNet release"
    raw_subdir: "raw/physionet_grabmyo"
    version: "1.0.2"
    citation_key: "GRABMyo"
    adapter_status: "planned_pr_a1"
    arbitration_role: "full"
    expected_raw_layout:
      - "raw/physionet_grabmyo/grabmyo-1.0.2/"
      - "raw/physionet_grabmyo/grabmyo-1.0.2/Session1/"
      - "raw/physionet_grabmyo/grabmyo-1.0.2/Session2/"
      - "raw/physionet_grabmyo/grabmyo-1.0.2/Session3/"
    verification_hash_steps:
      - "Run physionet downloader with checksums when available."
      - "Verify package integrity with PhysioNet metadata and local SHA256."
      - "Persist hashes in manifest.json before adapter run."
    hash_scope:
      include_globs:
        - "grabmyo-1.0.2/Session*/**/*.dat"
        - "grabmyo-1.0.2/Session*/**/*.hea"
        - "Session*/**/*.dat"
        - "Session*/**/*.hea"
      exclude_globs:
        - "**/toolbox/**"
        - "**/*.pdf"
      large_file_count_threshold: 50000
      large_bytes_threshold: 5368709120

  physionet_hyser:
