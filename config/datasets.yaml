    access: "script_or_manual_physionet"
    license: "Open Data Commons Attribution License v1.0"
    home: "https://physionet.org/content/hd-semg/"
    download_url: "https://physionet.org/content/hd-semg/1.0.0/"
    citation: "Li et al., Hyser dataset; PhysioNet release"
    raw_subdir: "raw/physionet_hyser"
    version: "1.0.0"
    citation_key: "Hyser"
    adapter_status: "planned_pr_a2"
    arbitration_role: "full"
    expected_raw_layout:
      - "raw/physionet_hyser/1.0.0/"
      - "raw/physionet_hyser/1.0.0/pr_dataset/subject*/session*/*.dat"
    verification_hash_steps:
      - "Verify downloaded package against PhysioNet record metadata."
      - "Run tree SHA256 hashing before preprocessing."
      - "Store hashes in stage manifest."
    hash_scope:
      include_globs:
        - "1.0.0/pr_dataset/**"
        - "1.0.0/random_dataset/**"
        - "pr_dataset/**"
        - "random_dataset/**"
      exclude_globs:
        - "1.0.0/toolbox/**"
        - "toolbox/**"
        - "**/*.pdf"
      large_file_count_threshold: 50000
      large_bytes_threshold: 5368709120

